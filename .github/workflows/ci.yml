name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements-server.txt pytest pytest-cov httpx ruff

      - name: Lint Python
        run: ruff check app/ tests/

      - name: Run tests
        env:
          DATABASE_URL: "sqlite://"
        run: python -m pytest tests/test_app/ -v --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Verify server starts
        env:
          DATABASE_URL: "sqlite://"
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 10); do
            curl -sf http://127.0.0.1:8000/health && break
            sleep 2
          done
          curl -sf http://127.0.0.1:8000/health | python -m json.tool
          kill %1

  migrations:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gk
          POSTGRES_PASSWORD: gk
          POSTGRES_DB: gatekeepify
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements-server.txt

      - name: Validate migrations against PostgreSQL
        env:
          DATABASE_URL: "postgresql://gk:gk@localhost:5432/gatekeepify"
        run: |
          python -m alembic upgrade head
          python -m alembic downgrade -1
          python -m alembic upgrade head

  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t gatekeepify:ci .

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Test
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # pip-audit reports known CVEs in pinned deps. Left non-blocking because
      # transitive vulns can appear with no fix available and need manual triage;
      # promote to blocking (drop continue-on-error) once findings are clean.
      - name: Audit Python dependencies
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements-server.txt

      # Blocks the build on high/critical advisories in production deps.
      - name: Audit Node dependencies
        working-directory: frontend
        run: |
          npm install
          npm audit --omit=dev --audit-level=high
