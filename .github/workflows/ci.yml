name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements-server.txt pytest httpx ruff

      - name: Lint Python
        run: ruff check app/ tests/

      - name: Run tests
        env:
          DATABASE_URL: "sqlite://"
        run: python -m pytest tests/test_app/ -v

      - name: Verify server starts
        env:
          DATABASE_URL: "sqlite://"
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          sleep 3
          curl -sf http://127.0.0.1:8000/health | python -m json.tool
          kill %1

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Audit Python dependencies
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements-server.txt

      - name: Audit Node dependencies
        continue-on-error: true
        working-directory: frontend
        run: |
          npm install
          npm audit --omit=dev
